<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Library Browser — A–Z</title>
  <style>
    :root {
      --bg:#fff; --panel:#fff; --ink:#111; --muted:#6b7280; --accent:#0f62fe; --ring:rgba(15,98,254,.18);
      --border:#e5e7eb; --header:#fafafa; --chip-bg:#f3f4f6; --btn:#111; --btn-ink:#fff; --shadow:0 6px 18px rgba(17,24,39,.05);
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#0b0f14; --panel:#111823; --ink:#e6edf3; --muted:#98a2b3; --accent:#5b9cff; --ring:rgba(91,156,255,.35);
        --border:#223045; --header:#0e1622; --chip-bg:#0e1622; --btn:#2a66ff; --btn-ink:#fff; --shadow:0 10px 30px rgba(0,0,0,.25); }
    }
    html,body{height:100%}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"Apple Color Emoji","Segoe UI Emoji";line-height:1.5}
    .wrap{max-width:1200px;margin:0 auto;padding:20px 16px 36px;}
    header.app{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
    h1{font-size:22px;font-weight:800;margin:0;letter-spacing:.2px}
    .muted{color:var(--muted);font-size:14px}
    .panel{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px;box-shadow:var(--shadow)}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}
    .field{grid-column:span 4;display:flex;flex-direction:column;gap:6px}
    .field label{font-size:12px;color:var(--muted)}
    input[type=text],select{width:100%;padding:10px 12px;border-radius:12px;border:1px solid var(--border);background:#fff;color:#111;outline:none;transition:box-shadow .15s,border-color .15s;-webkit-appearance:none;appearance:none}
    html[data-theme=dark] input[type=text],html[data-theme=dark] select{background:#0d141f;color:var(--ink)}
    input[type=text]::placeholder{color:#9ca3af}
    input[type=text]:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--ring)}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;align-items:center}
    button{padding:10px 14px;border-radius:12px;border:1px solid var(--border);background:#fff;color:var(--ink);cursor:pointer;-webkit-tap-highlight-color:rgba(0,0,0,0)}
    button.primary{background:var(--btn);color:var(--btn-ink);border-color:var(--btn)}
    .table-wrap{overflow:auto;max-height:70vh;border-radius:12px;border:1px solid var(--border);background:#fff;-webkit-overflow-scrolling:touch}
    table{width:100%;border-collapse:collapse;margin-top:0;font-size:14px}
    thead th{position:sticky;top:0;background:var(--header);border-bottom:1px solid var(--border);text-align:left;padding:10px;font-weight:700}
    tbody td{border-top:1px solid var(--border);padding:10px;vertical-align:top}
    .cards{display:none;gap:12px;margin-top:16px}
    .card{border:1px solid var(--border);border-radius:12px;padding:12px;background:var(--panel);box-shadow:var(--shadow)}
    .card h3{margin:0 0 6px;font-size:16px} .card .line{font-size:14px} .card .label{color:var(--muted);margin-right:6px}
    body[data-device=mobile] .table-wrap{display:none} body[data-device=mobile] .cards{display:grid;grid-template-columns:1fr}
    body[data-device=desktop] .table-wrap{display:block} body[data-device=desktop] .cards{display:none}
    @media (max-width:900px){.field{grid-column:span 12}}
    #err{display:none;position:fixed;inset:auto 12px 12px 12px;background:#fee2e2;color:#7f1d1d;padding:10px 12px;border:1px solid #fecaca;border-radius:10px;z-index:9999;font-size:13px}
    html[data-theme=dark] #err{background:#2b1414;color:#fecaca;border-color:#7f1d1d}
  </style>
</head>
<body data-device="desktop">
  <div class="wrap">
    <header class="app">
      <div>
        <h1>Library Browser — A–Z</h1>
	<h3> Instant answer at bottom / No return necessary</h3>
        <div class="muted">Search by author, title, and original language and genre.  Exports respect your filters.</div>
      </div>
      <div class="toggle" aria-label="Color theme">
        <button id="light">Light</button>
        <button id="dark">Dark</button>
        <button id="system">System</button>
      </div>
    </header>

    <div class="panel">
      <div class="grid">
        <div class="field">
          <label for="author">Author (name or last name)</label>
          <input id="author" type="text" placeholder="e.g., Duras or Marguerite Duras" />
        </div>
        <div class="field">
          <label for="title">Title</label>
          <input id="title" type="text" placeholder="e.g., La Peste or The Plague" />
	</div>
      </div>
      <div class="grid">	
        <div class="field">
          <label for="language">Language of the original</label>
          <select id="language">
            <option value="">All languages</option>
          </select>
        </div>
        <div class="field">
          <label for="genre">Genre</label>
          <select id="genre">
            <option value="">All genres</option>
          </select>
        </div>
      </div>
      <div class="actions">
        <button id="reset">Reset</button>
        <button id="export" class="primary">Export filtered as CSV</button>
        <span class="stats muted" id="stats"></span>
      </div>
    </div>

    <div class="table-wrap" style="margin-top:16px;">
      <table id="data-table">
        <thead><tr id="thead-row"></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <div class="cards" id="cards"></div>
  </div>

  <script>
  (function(){
    function showErr(msg){ var el=document.getElementById('err'); if(!el){ el=document.createElement('div'); el.id='err'; document.body.appendChild(el);} el.textContent='Error: '+msg; el.style.display='block'; }
    window.addEventListener('error', function(e){ if(e && e.message) showErr(e.message); });

    function mm(q){ try{ return window.matchMedia && window.matchMedia(q).matches; }catch(_){ return false; }}
    function safeNormalize(s){
      var x=String(s||'').toLowerCase();
      try{ return x.normalize('NFD').replace(/[\u0300-\u036f]/g,''); }catch(_){ return x; }
    }

    // Decode data
    var allRows = [];
    try {
      (function(){
        var bin = atob(window.__LIB_DATA_B64__ || '');
        var bytes = new Uint8Array(bin.length);
        for (var i=0; i<bin.length; i++) bytes[i] = bin.charCodeAt(0 + i);
        var jsonStr;
        if (window.TextDecoder) {
          jsonStr = new TextDecoder('utf-8').decode(bytes);
        } else {
          jsonStr = decodeURIComponent(escape(bin));
        }
        allRows = JSON.parse(jsonStr);
      })();
    } catch(e){ showErr('Data decode: '+e.message); allRows = []; }

    var columns     = window.__LIB_COLS__ || [];
    var colKeys     = window.__LIB_COLKEYS__ || [];
    var authorCols  = window.__LIB_AUTHOR_COLS__ || [];
    var titleCols   = window.__LIB_TITLE_COLS__ || [];
    var languageCol = window.__LIB_LANGUAGE_COL__ || '';
    var genreCol    = window.__LIB_GENRE_COL__ || '';
    var idx         = window.__LIB_IDX__ || {};

    var theadRow   = document.getElementById('thead-row');
    var tbody      = document.getElementById('tbody');
    var cards      = document.getElementById('cards');
    var stats      = document.getElementById('stats');
    var authorIn   = document.getElementById('author');
    var titleIn    = document.getElementById('title');
    var langSelect = document.getElementById('language');
    var genreSelect = document.getElementById('genre');

    // Build table header
    try{
      for(var i=0;i<columns.length;i++){
        var th=document.createElement('th');
        th.appendChild(document.createTextNode(columns[i]));
        th.setAttribute('data-col', colKeys[i]||'');
        theadRow.appendChild(th);
      }
    }catch(e){ showErr('Header: '+e.message); }

    // Language dropdown
    try{
      if(languageCol){
        var seen=Object.create(null), langs=[];
        for(var r=0;r<allRows.length;r++){
          var v=String(allRows[r][languageCol]||'').trim();
          if(v && !seen[v]){ seen[v]=1; langs.push(v); }
        }
        langs.sort();
        for(var j=0;j<langs.length;j++){
          var opt=document.createElement('option'); opt.value=langs[j]; opt.textContent=langs[j];
          langSelect.appendChild(opt);
        }
      } else {
        var lbl=document.querySelector('label[for="language"]');
        if(lbl) lbl.innerHTML='Language <span class="pill">not found in CSV</span>';
        if(langSelect) langSelect.style.display='none';
      }
    }catch(e){ showErr('Language: '+e.message); }

    // Genre dropdown
    try{
      if(genreCol){
        var seenG=Object.create(null), genres=[];
        for(var r=0;r<allRows.length;r++){
          var v=String(allRows[r][genreCol]||'').trim();
          if(v && !seenG[v]){ seenG[v]=1; genres.push(v); }
        }
        genres.sort();
        for(var j=0;j<genres.length;j++){
          var opt=document.createElement('option'); opt.value=genres[j]; opt.textContent=genres[j];
          if(genreSelect) genreSelect.appendChild(opt);
        }
      } else {
        var lblG=document.querySelector('label[for="genre"]');
        if(lblG) lblG.innerHTML='Genre <span class="pill">not found in CSV</span>';
        if(genreSelect) genreSelect.style.display='none';
      }
    }catch(e){ showErr('Genre: '+e.message); }

    function matches(row, qAuthor, qTitle, selLang, selGenre){
      var nAuthor=safeNormalize(qAuthor), nTitle=safeNormalize(qTitle), ok=true;
      if(nAuthor){
        var authorText='', keys=authorCols.length?authorCols:Object.keys(row);
        for(var i=0;i<keys.length;i++){ if(authorCols.length||/author/i.test(keys[i])) authorText+=' '+(row[keys[i]]||''); }
        ok = ok && safeNormalize(authorText).indexOf(nAuthor)!==-1;
      }
      if(nTitle){
        var titleText='', keys2=titleCols.length?titleCols:Object.keys(row);
        for(var k=0;k<keys2.length;k++){ if(titleCols.length||/title/i.test(keys2[k])) titleText+=' '+(row[keys2[k]]||''); }
        ok = ok && safeNormalize(titleText).indexOf(nTitle)!==-1;
      }
      if(selLang && languageCol){ ok = ok && String(row[languageCol]||'')===selLang; }
      if(selGenre && genreCol){ ok = ok && String(row[genreCol]||'')===selGenre; }
      return ok;
    }

    function cardFromRow(r){
      var wrap=document.createElement('div'); wrap.className='card';
      var h=document.createElement('h3'); var titleVal=(idx.title>=0)? r[columns[idx.title]] : (titleCols[0]? r[titleCols[0]] : '');
      h.appendChild(document.createTextNode(String(titleVal||''))); wrap.appendChild(h);
      if(idx.author>=0){
        var line=document.createElement('div'); line.className='line';
        var lab=document.createElement('span'); lab.className='label'; lab.textContent='Author';
        var val=document.createElement('span'); val.textContent=String(r[columns[idx.author]]||'');
        line.appendChild(lab); line.appendChild(val); wrap.appendChild(line);
      }
      if(idx.original>=0 && String(r[columns[idx.original]]||'')){
        var l2=document.createElement('div'); l2.className='line';
        var lab2=document.createElement('span'); lab2.className='label'; lab2.textContent='Original title';
        var v2=document.createElement('span'); v2.textContent=String(r[columns[idx.original]]||'');
        l2.appendChild(lab2); l2.appendChild(v2); wrap.appendChild(l2);
      }
      if(idx.lang>=0 || idx.year>=0){
        var l3=document.createElement('div'); l3.className='line';
        if(idx.lang>=0){
          var lab3=document.createElement('span'); lab3.className='label'; lab3.textContent='Language';
          var v3=document.createElement('span'); v3.textContent=String(r[columns[idx.lang]]||'');
          l3.appendChild(lab3); l3.appendChild(v3);
        }
        if(idx.year>=0){
          var sep=document.createElement('span'); sep.textContent='  •  '; sep.className='label'; l3.appendChild(sep);
          var lab4=document.createElement('span'); lab4.className='label'; lab4.textContent='Year';
          var v4=document.createElement('span'); v4.textContent=String(r[columns[idx.year]]||'');
          l3.appendChild(lab4); l3.appendChild(v4);
        }
        wrap.appendChild(l3);
      }
      return wrap;
    }

    function render(rows){
      try{
        tbody.innerHTML=''; var frag=document.createDocumentFragment();
        for(var r=0;r<rows.length;r++){
          var tr=document.createElement('tr');
          for(var i=0;i<columns.length;i++){
            var td=document.createElement('td');
            td.setAttribute('data-col', colKeys[i]||'');
            var val=rows[r][columns[i]];
            td.textContent=(val==null)?'':String(val);
            tr.appendChild(td);
          }
          frag.appendChild(tr);
        }
        tbody.appendChild(frag);

        cards.innerHTML=''; var cfrag=document.createDocumentFragment();
        for(var r2=0;r2<rows.length;r2++) cfrag.appendChild(cardFromRow(rows[r2]));
        cards.appendChild(cfrag);

        stats.textContent=rows.length+' / '+allRows.length+' shown';
      }catch(e){ showErr('Render: '+e.message); }
    }

    function applyFilters(){
      var qa=authorIn.value, qt=titleIn.value, ql=langSelect?langSelect.value:'', qg=genreSelect?genreSelect.value:'';
      var filtered=[]; for(var i=0;i<allRows.length;i++) if(matches(allRows[i], qa, qt, ql, qg)) filtered.push(allRows[i]);
      render(filtered);
    }

    // Events
    if(authorIn) authorIn.addEventListener('input', applyFilters);
    if(titleIn)  titleIn.addEventListener('input', applyFilters);
    if(langSelect) langSelect.addEventListener('change', applyFilters);
    if(genreSelect) genreSelect.addEventListener('change', applyFilters);
    var resetBtn=document.getElementById('reset');
    if(resetBtn) resetBtn.addEventListener('click', function(){ authorIn.value=''; titleIn.value=''; if(langSelect) langSelect.value=''; if(genreSelect) genreSelect.value=''; applyFilters(); });

    // Theme (simple buttons; avoids localStorage issues)
    document.getElementById('light').onclick=function(){ document.documentElement.setAttribute('data-theme','light'); };
    document.getElementById('dark').onclick=function(){ document.documentElement.setAttribute('data-theme','dark'); };
    document.getElementById('system').onclick=function(){ document.documentElement.setAttribute('data-theme','auto'); };

    // Device mode (desktop/tablet vs. phone)
    function isMobileUA(){ return /iPhone|iPad|iPod|Android|Mobile/i.test(navigator.userAgent||''); }
    function detectDevice(){ var coarse=mm('(pointer: coarse)'), small=window.innerWidth<768; return (coarse||small||isMobileUA())?'mobile':'desktop'; }
    function applyDevice(){ document.body.setAttribute('data-device', detectDevice()); }
    window.addEventListener('resize', (function(){ var t; return function(){ clearTimeout(t); t=setTimeout(applyDevice,150); }; })());
    applyDevice();

    // Export CSV
    document.getElementById('export').onclick=function(){
      function esc(v){ var s=(v==null)?'':String(v); return /[",\n]/.test(s)?('"' + s.replace(/"/g,'""') + '"'):s; }
      var head=columns.map(esc).join(',');
      var qa=authorIn.value, qt=titleIn.value, ql=langSelect?langSelect.value:'', qg=genreSelect?genreSelect.value:'';
      var filtered=[]; for(var i=0;i<allRows.length;i++) if(matches(allRows[i], qa, qt, ql, qg)) filtered.push(allRows[i]);
      var body=filtered.map(function(r){ return columns.map(function(c){ return esc(r[c]); }).join(','); }).join('\n');
      var csv=head+'\n'+body;
      try{ var blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'}); var url=URL.createObjectURL(blob); var a=document.createElement('a'); a.href=url; a.download='filtered_library.csv'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); }
      catch(e){ var url2='data:text/csv;charset=utf-8,'+encodeURIComponent(csv); window.open(url2,'_blank'); }
    };

    // Initial render
    render(allRows);
  })();
  </script>
  <div id="err"></div>
</body>
</html>
